steps:
  # Build the Docker image
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "-t",
        "us-central1-docker.pkg.dev/$PROJECT_ID/golf-site/handicap-report:$COMMIT_SHA",
        "-t",
        "us-central1-docker.pkg.dev/$PROJECT_ID/golf-site/handicap-report:latest",
        ".",
      ]

  # Push to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "push",
        "--all-tags",
        "us-central1-docker.pkg.dev/$PROJECT_ID/golf-site/handicap-report",
      ]

  # Deploy to Cloud Run
  - name: "gcr.io/cloud-builders/gcloud"
    args:
      [
        "run",
        "deploy",
        "handicap-report",
        "--image",
        "us-central1-docker.pkg.dev/$PROJECT_ID/golf-site/handicap-report:$COMMIT_SHA",
        "--region",
        "us-central1",
        "--platform",
        "managed",
        "--allow-unauthenticated",
        "--port",
        "8080",
        "--memory",
        "256Mi",
        "--cpu",
        "1",
        "--min-instances",
        "0",
        "--max-instances",
        "3",
      ]

images:
  - "us-central1-docker.pkg.dev/$PROJECT_ID/golf-site/handicap-report"
